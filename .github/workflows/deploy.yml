name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Setup Rust nightly with WASM target
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
          components: rust-src

      # Cache Rust dependencies
      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: rust-wasm-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: rust-wasm-

      # Install wasm-pack from pre-built binary (NOT cargo install -- faster)
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      # Install FRB codegen
      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen

      # Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # Cache Flutter pub dependencies
      - name: Cache Flutter pub dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: flutter-pub-

      # Install Flutter dependencies
      - name: Flutter pub get
        run: flutter pub get

      # Generate FRB Dart bindings (must run before build-web)
      - name: Generate Dart bindings
        run: flutter_rust_bridge_codegen generate

      # Build WASM (must run before flutter build web)
      - name: Build WASM
        run: dart run flutter_rust_bridge build-web --release

      # Build Flutter web with WASM
      - name: Build Flutter web
        run: flutter build web --wasm --release --base-href "/pulijoodam/"

      # Copy coi-serviceworker to build output (Flutter build does not copy it)
      - name: Add coi-serviceworker
        run: cp web/coi-serviceworker.js build/web/

      # Upload to GitHub Pages
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web/

      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
